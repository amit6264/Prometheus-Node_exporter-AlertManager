global:
  resolve_timeout: 5m

route:
  receiver: 'slack-notify'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: 'slack-notify'
    slack_configs:
      - channel: "#alerting"
        api_url: "https://hooks.slack.com/services/XXXX/YYYY/ZZZZ"   # give your slack webhook url
        send_resolved: true
        text: >
          *Alert:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Status:* {{ .Status }}
